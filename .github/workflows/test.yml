# Runs the test suite on every push and PR, so breakage surfaces when it
# happens instead of at release-tag time (release.yml).
name: test

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy -- -D warnings
        continue-on-error: true
