# Cut a release by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
# Builds Windows + Linux binaries and attaches them to a GitHub Release.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            binary: target/release/worklog.exe
            artifact: worklog-windows-x86_64.exe
          - os: ubuntu-latest
            binary: target/release/worklog
            artifact: worklog-linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install GUI build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxss-dev

      - name: Test
        run: cargo test --release

      - name: Build
        run: cargo build --release

      - name: Stage artifact
        shell: bash
        run: |
          mkdir dist
          cp "${{ matrix.binary }}" "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
